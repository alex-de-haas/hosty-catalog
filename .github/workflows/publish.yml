name: Publish

# On merge to main: regenerate catalog.json (with absolute Pages URLs) and deploy it to GitHub Pages.
# Enable Pages once under Settings → Pages → Source: GitHub Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate
        run: node scripts/validate.mjs
      - name: Generate catalog
        # --vendor fetches each app's manifest + declared display assets from the app repo and
        # vendors them into dist/ (self-contained storefront, no hotlinking). It hits the network
        # and fails the build on any declared-asset problem; a failed build keeps the last good
        # Pages deploy live.
        run: node scripts/generate-catalog.mjs --vendor
        env:
          # Deterministic project-Pages base URL: https://<owner>.github.io/<repo>.
          CATALOG_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
