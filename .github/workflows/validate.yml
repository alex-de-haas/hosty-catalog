name: Validate

# PR gate: validate every entry (and any repo-hosted feed) and prove the catalog still generates.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate entries
        run: node scripts/validate.mjs
      - name: Test tooling
        run: node scripts/vendor.test.mjs
      - name: Generate catalog (build check)
        # Offline build check — no --vendor, so an unrelated PR is never blocked by an external
        # app repo's state. Manifest-asset vendoring runs at publish (and via `npm run generate:vendor`
        # for authors self-checking a submission).
        run: node scripts/generate-catalog.mjs
